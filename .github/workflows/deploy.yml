name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Login to Docker Hub
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  - name: Build Docker Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/erp-backend-new:latest .

  - name: Push Docker Image
    run: docker push ${{ secrets.DOCKER_USERNAME }}/erp-backend-new:latest

  - name: Deploy to EC2
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        cd /home/ubuntu
        docker rm -f erp || true
        docker pull ${{ secrets.DOCKER_USERNAME }}/erp-backend-new:latest
        docker run -d -p 80:5000 --restart always --name erp ${{ secrets.DOCKER_USERNAME }}/erp-backend-new:latest
```
